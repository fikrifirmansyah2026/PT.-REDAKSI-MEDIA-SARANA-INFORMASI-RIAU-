<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

/* HEADER */
header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
}

/* CONTAINER */
.container {
  padding: 15px;
}

/* FORM */
.form-box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  background: #007bff;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

/* CARD */
.card {
  background: white;
  border-radius: 10px;
  margin-bottom: 15px;
  overflow: hidden;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.delete-btn {
  background: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h2>Dashboard Admin Berita</h2>
</header>

<div class="container">

  <!-- FORM TAMBAH BERITA -->
  <div class="form-box">
    <h3>Tambah Berita</h3>

    <input type="text" id="judul" placeholder="Judul berita">
    
    <select id="kategori">
      <option>Nasional</option>
      <option>Daerah</option>
      <option>Politik</option>
      <option>Ekonomi</option>
    </select>

    <input type="text" id="gambar" placeholder="Link gambar (https://...)">

    <textarea id="deskripsi" placeholder="Isi berita"></textarea>

    <button onclick="tambahBerita()">Simpan Berita</button>
  </div>

  <!-- LIST BERITA -->
  <div id="listBerita"></div>

</div>

<script>
let dataBerita = JSON.parse(localStorage.getItem("berita")) || [];

function renderBerita() {
  const container = document.getElementById("listBerita");
  container.innerHTML = "";

  dataBerita.forEach((item, index) => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.gambar}" onerror="this.src='https://source.unsplash.com/600x400/?news'">
        <div class="card-content">
          <b>${item.judul}</b>
          <p><small>${item.kategori}</small></p>
          <p>${item.deskripsi}</p>
          <button class="delete-btn" onclick="hapusBerita(${index})">Hapus</button>
        </div>
      </div>
    `;
  });
}

function tambahBerita() {
  const judul = document.getElementById("judul").value;
  const kategori = document.getElementById("kategori").value;
  const gambar = document.getElementById("gambar").value;
  const deskripsi = document.getElementById("deskripsi").value;

  if (!judul || !deskripsi) {
    alert("Isi judul dan deskripsi!");
    return;
  }

  dataBerita.unshift({ judul, kategori, gambar, deskripsi });

  localStorage.setItem("berita", JSON.stringify(dataBerita));

  document.getElementById("judul").value = "";
  document.getElementById("gambar").value = "";
  document.getElementById("deskripsi").value = "";

  renderBerita();
}

function hapusBerita(index) {
  dataBerita.splice(index, 1);
  localStorage.setItem("berita", JSON.stringify(dataBerita));
  renderBerita();
}

renderBerita();
</script>

</body>
    </html>
